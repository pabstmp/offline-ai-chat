services:
  offline-ai-chat:
    build:
      context: .
    container_name: offline-ai-chat
    environment:
      # Container precisa escutar em 0.0.0.0 internamente para o port mapping funcionar.
      # O bind externo abaixo limita o acesso ao localhost do host por padrão.
      HOST: 0.0.0.0
      PORT: 8080
      # Default dev/local: permitido porque a porta está bindada só em 127.0.0.1.
      # Para LAN/companhia: remova esta linha e defina WORKSPACE_ROOTS + auth.
      ALLOW_UNRESTRICTED_WORKSPACE: "true"
      ALLOWED_LM_HOSTS: "localhost,127.0.0.1:1234,host.docker.internal:1234"
      # APP_AUTH_USER: offline-ai
      # APP_AUTH_PASSWORD: change-me
      # Para LM Studio em outra maquina, adicione o host:porta aqui:
      # ALLOWED_LM_HOSTS: localhost,host.docker.internal:1234,192.168.1.50:1234
      # WORKSPACE_ROOTS: /workspace
      #
      # Web search (tool builtin web_search):
      # - Default: DuckDuckGo HTML scrape (zero config, sujeito a rate limit).
      # - Opcional: Brave Search API (free 2000/mês, sem anti-bot). Crie
      #   uma chave em https://api.search.brave.com/app e descomente:
      # BRAVE_SEARCH_API_KEY: "BSA_seu_token_aqui"
      # O usuário também pode configurar a chave via UI em
      # Configurações → Avançado → Busca web (preferida sobre o env).
      #
      # Tarefas agendadas (cron engine) — DESLIGADO por default. Para ativar:
      # CRON_ENABLED: "true"
      # FS_WRITE_ROOTS: /app/data/output   # única pasta gravável (NÃO use o mount :ro abaixo)
      # CRON_STATE_DIR: /app/data          # onde vive cron-state.json (volume nomeado)
      # CRON_TZ: America/Sao_Paulo          # fuso pros horários "8h" etc.
      # CRON_MAX_TIMEOUT_MS: "300000"
      # As tarefas/conexões são gerenciadas pela UI (Configurações → Tarefas).
    ports:
      - "127.0.0.1:8080:8080"
    # Bind mount the host filesystem read-only so server.js can read files
    # from the host. The server auto-translates Windows-style paths
    # (C:\Users\foo) into /host/c/Users/foo when running in container.
    #
    # On Docker Desktop Windows (with WSL2 integration) the C:\ drive is
    # available at /mnt/c — we bind it as /host/c so the server's
    # translateWindowsPath finds it automatically.
    #
    # Note: read-only (:ro) means the server NEVER writes back to your disk.
    volumes:
      - /mnt/c:/host/c:ro
      # Add more drives if you have them:
      # - /mnt/d:/host/d:ro
      # - /mnt/e:/host/e:ro
      # Persist tesseract.js traineddata downloads between restarts —
      # otherwise the first OCR run after a restart re-downloads the
      # ~17MB language packs from the CDN.
      - tesseract-cache:/app/.cache/tesseract
      # Persiste o estado do cron (cron-state.json) + saída das tarefas
      # (boletins, backups) entre restarts/recreate. É a ÚNICA pasta gravável —
      # o mount /host/c acima é :ro de propósito, então a saída do cron vai aqui.
      - cron-data:/app/data
    restart: unless-stopped

volumes:
  tesseract-cache:
  cron-data:
