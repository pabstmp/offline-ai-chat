<!doctype html>
<html lang="pt-BR" data-theme="system">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0b0d" />
    <title>Offline AI Chat</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%237c5cff'/%3E%3Cstop offset='100%25' stop-color='%232563eb'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cpath d='M16 22h32v18a4 4 0 0 1-4 4H28l-8 6v-6h-4a4 4 0 0 1-4-4V22a0 0 0 0 1 4 0z' fill='none' stroke='white' stroke-width='3' stroke-linejoin='round'/%3E%3Ccircle cx='25' cy='32' r='2.5' fill='white'/%3E%3Ccircle cx='32' cy='32' r='2.5' fill='white'/%3E%3Ccircle cx='39' cy='32' r='2.5' fill='white'/%3E%3C/svg%3E" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="modulepreload" href="./modules/store.js" />
    <link rel="modulepreload" href="./modules/schema.js" />
    <link rel="modulepreload" href="./modules/api.js" />
    <link rel="modulepreload" href="./modules/theme.js" />
  </head>
  <body>
    <div class="app">
      <!-- Topbar -->
      <header class="topbar" role="banner">
        <button id="sidebarToggle" class="icon-button" type="button" aria-label="Alternar barra lateral" title="Histórico (Ctrl+B)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <div class="topbar-brand">
          <div class="topbar-mark" aria-hidden="true"></div>
          <span>Offline AI</span>
        </div>

        <div class="topbar-spacer"></div>

        <button id="profileChip" class="topbar-model" type="button" title="Trocar perfil">
          <span id="profileChipLabel">Perfil</span>
        </button>

        <button id="modelChip" class="topbar-model" type="button" title="Trocar modelo">
          <span id="modelChipLabel">Sem modelo</span>
        </button>

        <button id="statusPill" class="status-pill" type="button" title="Estado da conexão">
          <span id="statusDot" class="dot"></span>
          <span id="statusLabel">Desconectado</span>
        </button>

        <button id="ragIndexingIndicator" class="rag-indexing-indicator hidden" type="button"
                title="Indexando… clique para ver detalhes"
                aria-label="Indexação RAG em andamento">
          <span class="rag-indexing-dot"></span>
        </button>

        <button id="workspaceToggle" class="icon-button" type="button" aria-label="Workspace" title="Workspace (Ctrl+Shift+E)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>

        <button id="paletteButton" class="icon-button" type="button" aria-label="Paleta de comandos" title="Paleta (Ctrl+K)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>

        <button id="settingsButton" class="icon-button" type="button" aria-label="Configurações" title="Configurações (Ctrl+,)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </header>

      <div class="app-body">
        <aside id="sidebar" class="sidebar" aria-label="Histórico de conversas">
          <button id="newChatButton" class="btn btn-secondary btn-full" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nova conversa
          </button>
          <input id="historySearch" type="search" class="sidebar-search" placeholder="Buscar conversas..." autocomplete="off" />
          <ul id="historyList" class="history-list"></ul>
        </aside>
        <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

        <main class="chat" role="main">
          <section id="messages" class="messages" aria-live="polite">
            <div id="emptyState" class="empty">
              <div class="empty-mark" aria-hidden="true"></div>
              <p class="empty-title">Pronto quando você estiver.</p>
              <div class="suggestions" aria-label="Sugestões">
                <!-- chips rendered dynamically by app.js refreshSuggestionChips() -->
              </div>
            </div>
            <div id="messagesInner" class="messages-inner"></div>
          </section>
          <button id="scrollDownButton" type="button" class="btn btn-secondary btn-sm scroll-down" hidden>↓ Novas mensagens</button>

          <form id="chatForm" class="composer">
            <div id="contextPanel" class="composer-context hidden"></div>

            <div class="composer-frame">
              <textarea id="promptInput" aria-label="Mensagem" placeholder="Digite sua mensagem..." rows="1"></textarea>
              <div class="composer-bar">
                <button id="attachButton" type="button" class="icon-button" aria-label="Anexar arquivo" title="Anexar (Ctrl+U)" style="width:28px;height:28px;">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <button id="ragPill" type="button" class="rag-pill hidden" title="Recuperação semântica RAG ativa">
                  <span class="rag-pill-dot"></span>
                  <span>RAG</span>
                </button>
                <span class="token-count" id="tokenCount">~0 tok</span>
                <span class="spacer"></span>
                <button id="stopButton" class="btn btn-ghost btn-sm" type="button" hidden>Parar</button>
                <button id="sendButton" class="btn btn-primary btn-sm" type="submit">Enviar</button>
              </div>
            </div>
          </form>
        </main>
      </div>
    </div>

    <div id="settingsDrawer" class="drawer" role="dialog" aria-modal="true" aria-label="Configurações" aria-hidden="true">
      <div class="drawer-panel">
        <aside class="drawer-rail">
          <div class="drawer-rail-title">Configurações</div>
          <ul class="drawer-rail-tabs" role="tablist" id="settingsTabs"></ul>
          <div class="drawer-rail-footer">v2.0</div>
        </aside>
        <section class="drawer-content">
          <header class="drawer-header">
            <h2 class="drawer-title" id="drawerTitle">Servidor</h2>
            <button id="settingsClose" class="icon-button" type="button" aria-label="Fechar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </header>
          <div class="drawer-body" id="settingsBody"></div>
        </section>
      </div>
    </div>

    <div class="toasts" id="toasts" aria-live="polite" aria-atomic="false"></div>

    <script type="module" src="./app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
